rationale: |
  Tres problemas en un único componente (MovilSelector.tsx) — líneas ~312-320 (filtro pedidos),
  ~434-440 (filtro services), ~645-657 (badge móviles).
  La raíz: filteredMoviles (visibles en colapsable) y selectedMoviles son estados independientes
  y el badge no sincroniza; además la lógica de filtro no descarta inactivos ni "sin asignar".
clarifying_questions_resolved:
  - q: "¿El colapsable Empresa Fletera es donde están los 80 móviles mencionados?"
    a: "Sí. El colapsable per-empresa contiene N móviles (ej 80). 'Todos' = todos los del colapsable."
  - q: "Cuando se selecciona Todos ¿badge debe decir 'Todos' o nombres?"
    a: "Decir 'Todos' literal — comportamiento como en primer login (sin filtro activo)."
  - q: "¿Pedidos 'Sin asignar' deben filtrarse cuando hay filtro parcial?"
    a: "Sí. Texto del usuario: 'no deber mostrar ni los pedidos de moviles inactivos, ni los pedidos sin movil'."
